[project]
name = "kuchikae"
version = "0.1.0"
requires-python = ">=3.11,<3.12"
dependencies = [
    "gradio",
    "numpy",
    "soundfile",
    "pyyaml",
    "pytest",
    "torch>=2.12.0",
    "torchaudio>=2.11.0",
]

[tool.uv.sources]
kuchikae = { workspace = true }

[tool.pytest.ini_options]
testpaths = ["tests"]
