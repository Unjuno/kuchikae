# Kuchikae text transform evaluation cases
# Schema:
#   hard_preserve: exact substring must appear (fail if missing)
#   semantic_preserve: canonical + allowed variants (warn if none found)
#   forbidden: must not appear in output (fail if found)
#   blockers: human-readable failure descriptions
#
# Backward compat: must_preserve → hard_preserve, should_not_include → forbidden

cases:
  # ──────────────────────────────────────────────
  # 1. fact_preservation — all base templates
  # ──────────────────────────────────────────────
  - id: fp-001
    category: fact_preservation
    input: "明日15時に田中さんに資料を送ってください"
    template: 自然に
    expected:
      hard_preserve: ["15時", "田中さん", "資料"]
      forbidden: []
      style_notes: "自然な会話調で、事実を保持"
      blockers: ["日時が変わっている", "人物名が変わっている"]

  - id: fp-002
