      must_preserve: ["10"]
      should_not_include: []
      style_notes: "英語に変換（翻訳はv0.1非対応だがプロンプトテスト用）"
      failure_blockers: []

  - id: cp-004
    category: custom_prompt
    input: "お疲れ様です"
    template: カスタム
    custom_prompt: "武士の口調にしてください"
    expected:
      must_preserve: []
      should_not_include: []
      style_notes: "武士口調で挨拶を変換"
      failure_blockers: ["武士口調になっていない"]

  - id: cp-005
    category: custom_prompt
    input: "この商品は高品質です"
    template: カスタム
    custom_prompt: "セールスっぽく、魅力的に伝えてください"
    expected:
      must_preserve: ["商品", "高品質"]
      should_not_include: []
      style_notes: "セールス調で商品情報を保持"
      failure_blockers: ["商品情報が変わっている"]

  - id: cp-006
    category: custom_prompt
    input: "明日は休みです"
    template: カスタム
    custom_prompt: "深く、哲学的に表現してください"
    expected:
      must_preserve: ["明日", "休み"]
      should_not_include: []
      style_notes: "哲学的表現で情報を保持"
      failure_blockers: ["情報が変わっている"]
